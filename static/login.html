<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | YantrAI Accounting</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="card" style="width: 400px; padding: 40px; text-align: center;">
        <h1 style="background: linear-gradient(to right, #da7756, #e8a87c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px; font-weight: 800;">YantrAI Login</h1>
        <div class="form-group" style="text-align: left;">
            <label>Username</label>
            <input type="text" id="username" placeholder="sadmin or admin">
        </div>
        <div class="form-group" style="text-align: left;">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="handleLogin()" id="login-btn">Sign In</button>
        <p id="error-msg" style="color: #f87171; margin-top: 20px; font-size: 0.875rem; display: none;"></p>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('error-msg');

            btn.innerText = 'Authenticating...';
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) {
                    const errObj = await res.json();
                    throw new Error(errObj.detail || 'Invalid credentials');
                }

                const data = await res.json();
                localStorage.setItem('currentUser', JSON.stringify(data.user));
                window.location.href = '/';
            } catch (error) {
                errorEl.innerText = error.message;
                errorEl.style.display = 'block';
                btn.innerText = 'Sign In';
            }
        }
    </script>
</body>
</html>
